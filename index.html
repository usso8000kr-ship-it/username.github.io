<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>📺 현정's 리얼 투자 방송</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b10;
    color:white;
}

.topbar{
    background:#000;
    padding:10px;
    text-align:center;
    color:red;
    font-weight:bold;
}

.wrap{
    display:flex;
    max-width:1000px;
    margin:0 auto;
}

.main{
    flex:2;
    padding:15px;
}

.chat{
    flex:1;
    height:90vh;
    overflow:auto;
    background:rgba(255,255,255,0.05);
    border-left:2px solid #00ffff;
    padding:10px;
}

.card{
    background:rgba(255,255,255,0.06);
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    font-weight:bold;
    background:#00ffff;
    color:black;
    cursor:pointer;
}

.status{
    font-size:14px;
    color:#00ffff;
    min-height:70px;
    line-height:1.4;
}

.msg{
    font-size:13px;
    margin:4px 0;
}

.super{
    color:gold;
    font-weight:bold;
}

.end{
    text-align:center;
    font-size:22px;
    margin-top:40px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="topbar">🔴 LIVE | 현정 투자 방송 (REAL MODE)</div>

<div class="wrap">

<div class="main" id="game">

<div class="card">
💰 자산: <span id="money">100000</span>원<br>
👀 시청자: <span id="viewers">1200</span>
</div>

<div class="card status" id="stream">
🎤 해설:  
"현재 시장은 변동성이 낮아 보이지만,  
거래량이 급격히 줄어드는 구간입니다.  
이럴 때 오히려 큰 변동이 나올 가능성이 있습니다."
</div>

<div class="card">

<button onclick="trade('안전')">🟢 안정 투자</button>
<button onclick="trade('도박')">🔴 고위험 투자</button>
<button onclick="trade('올인')">💀 올인</button>

</div>

<div class="card">
<button onclick="superchat()">💸 슈퍼챗 1000원</button>
</div>

</div>

<div class="chat" id="chat">
💬 시청자 채팅 시작<br><br>
</div>

</div>

<script>

let money = 100000;
let viewers = 1200;
let ended = false;

let users = ["김단타","인버스전문가","주린이","현정팬","차트분석러","손절마스터","ETF맨","야수의심장"];

function trade(type){

    let base = money * (type==="올인"?1:0.3);

    let rate;

    if(type==="안전"){
        rate = 0.85 + Math.random()*0.5;
    }
    else if(type==="도박"){
        rate = Math.random() < 0.5 ? 3 : 0.25;
    }
    else{
        rate = Math.random() < 0.35 ? 4 : 0.1;
    }

    let result = Math.floor(base * rate);
    money = money - base + result;

    document.getElementById("money").innerText = Math.floor(money).toLocaleString();

    updateStream(type, rate, result-base);
    updateChat(result-base);
    updateViewers(result-base);

    checkEnd();
}

function updateStream(type, rate, profit){

    let msg = "";

    if(type === "안전"){
        msg =
`🎤 해설:
"안정 투자는 리스크를 줄이는 전략입니다.
하지만 지금처럼 변동성이 커질 때는
수익률이 제한될 수 있습니다.

현재 배팅 구조상 기대값은 낮지만
손실 방어에는 유리한 선택입니다."`;
    }

    if(type === "도박"){
        msg =
`🎤 해설:
"지금 선택은 고위험 전략입니다.
성공하면 2~3배 수익이 가능하지만,
반대로 큰 손실 가능성도 매우 높습니다.

시장 방향이 불확실한 상황에서는
가장 심리 싸움이 중요한 선택입니다."`;
    }

    if(type === "올인"){
        msg =
`🎤 해설:
"올인은 사실상 시장 방향에 모든 자산을 맡기는 선택입니다.
성공 시 게임을 뒤집을 수 있지만
실패 시 즉시 게임 종료급 손실이 발생합니다.

지금은 확률적으로 매우 위험한 구간입니다."`;
    }

    document.getElementById("stream").innerText = msg;
}

function updateChat(profit){

    let chat = document.getElementById("chat");

    let msgs;

    if(profit > 50000){
        msgs = [
            "이건 진짜 미쳤다",
            "데이터상 말이 안되는데?",
            "와 이건 인정해야지",
            "지금 들어간 사람 승자"
        ];
    }
    else if(profit < -50000){
        msgs = [
            "ㅋㅋㅋㅋ 끝났다",
            "손절 안함?",
            "이건 진짜 아니다",
            "멘탈 터졌다"
        ];
    }
    else{
        msgs = [
            "지금 애매한 구간임",
            "관망이 맞는듯",
            "아직 판단 불가",
            "큰거 온다 느낌"
        ];
    }

    for(let i=0;i<4;i++){
        let div = document.createElement("div");
        div.className="msg";
        div.innerText =
        users[Math.floor(Math.random()*users.length)] + ": " +
        msgs[Math.floor(Math.random()*msgs.length)];

        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
}

function updateViewers(profit){

    if(profit > 50000) viewers += 300;
    else if(profit < -50000) viewers -= 400;
    else viewers += Math.floor(Math.random()*100 - 50);

    if(viewers < 100) viewers = 100;

    document.getElementById("viewers").innerText = viewers;
}
https://github.com/usso8000kr-ship-it/usso8000kr-ship-it.github.io/tree/main
function superchat(){ㅔ

    money += 1000;
    viewers += 50;

    let chat = document.getElementById("chat");

    let div = document.createElement("div");
    div.className="msg super";
    div.innerText = "💸 슈퍼챗: 1000원 감사합니다!";

    chat.appendChild(div);
}

function checkEnd(){

    if(money <= 0){
        end("💀 파산 엔딩\n방송 종료");
    }

    if(viewers <= 80){
        end("📉 시청자 이탈\n방송 폭망");
    }
}

function end(text){

    document.getElementById("game").innerHTML =
    "<div class='end'>" + text + "</div>";
}

</script>

</body>
</html>
